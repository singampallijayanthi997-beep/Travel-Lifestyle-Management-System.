<!DOCTYPE html>
<html>

<head>

<title>Reviews</title>

<style>

body{
font-family:Arial;
background:#eef6ff;
margin:0;
}

.header{
background:#0077cc;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#0077cc;
color:white;
}

button{
padding:8px 12px;
margin-bottom:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<button onclick="window.location='/dashboard'">Dashboard</button>

Reviews

</div>

<div class="container">

<button onclick="loadReviews()">Load Reviews</button>

<table id="reviewsTable">

<thead>
<tr>
<th>ID</th>
<th>User ID</th>
<th>Hotel ID</th>
<th>Rating</th>
<th>Comment</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

function loadReviews(){

fetch("/reviews")

.then(res=>res.json())

.then(data=>{

let tbody=document.querySelector("#reviewsTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

tbody.innerHTML+=`
<tr>
<td>${row.review_id}</td>
<td>${row.user_id}</td>
<td>${row.hotel_id}</td>
<td>${row.rating}</td>
<td>${row.comment}</td>
</tr>
`

})

})

}

</script>

</body>

</html>
