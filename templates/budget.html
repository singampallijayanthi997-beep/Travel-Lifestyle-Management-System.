<!DOCTYPE html>
<html>

<head>

<title>Budget Planner</title>

<style>

body{
font-family:Arial;
background:#eef6ff;
margin:0;
}

.header{
background:#0077cc;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.container{
padding:30px;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#0077cc;
color:white;
}

button{
padding:8px 12px;
margin-bottom:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">

<button onclick="window.location='/dashboard'">Dashboard</button>

Budget Planner

</div>

<div class="container">

<button onclick="loadBudget()">Load Budget</button>

<table id="budgetTable">

<thead>
<tr>
<th>ID</th>
<th>User ID</th>
<th>Location ID</th>
<th>Total Budget</th>
<th>Travel Days</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script>

function loadBudget(){

fetch("/budget")

.then(res=>res.json())

.then(data=>{

let tbody=document.querySelector("#budgetTable tbody")

tbody.innerHTML=""

data.forEach(row=>{

tbody.innerHTML+=`
<tr>
<td>${row.budget_id}</td>
<td>${row.user_id}</td>
<td>${row.location_id}</td>
<td>${row.total_budget}</td>
<td>${row.travel_days}</td>
</tr>
`

})

})

}

</script>

</body>

</html>
