<!DOCTYPE html>
<html>

<head>

<title>Travel Lifestyle Login</title>

<style>

body{
font-family:Arial;
background:#eaf4ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
color:#0077cc;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
width:100%;
padding:10px;
margin-top:20px;
background:#0077cc;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Travel Lifestyle</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

fetch("/login",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
email:email,
password:password
})

})

.then(response => response.json())

.then(data => {

if(data.status=="success"){

alert("Login Successful")

window.location.href="/dashboard"

}

else{

alert("Invalid Login")

}

})

}

</script>

</body>

</html>
